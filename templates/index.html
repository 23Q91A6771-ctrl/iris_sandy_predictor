<!DOCTYPE html>
<html>
<head>
    <title>Iris Class Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 40px; }
        input { padding: 8px; margin: 6px; }
        button { padding: 10px 14px; }
    </style>
</head>

<body>
    <h2>Iris Flower Class Prediction</h2>

    <form method="POST" action="/predict">
        <input type="number" step="any" name="sepal_length" placeholder="Sepal Length (cm)" required><br>
        <input type="number" step="any" name="sepal_width" placeholder="Sepal Width (cm)" required><br>
        <input type="number" step="any" name="petal_length" placeholder="Petal Length (cm)" required><br>
        <input type="number" step="any" name="petal_width" placeholder="Petal Width (cm)" required><br>
        
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3>Predicted Class: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
